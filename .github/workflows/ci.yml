name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Dogfood — scan ctx-keeper itself
        run: |
          node bin/ctx.js init --dir .
          node bin/ctx.js scan --dir .
          node -e "
            const s = require('fs').readFileSync('.ctx/snapshot.json','utf-8');
            const snap = JSON.parse(s);
            console.log('Edges:', snap.deps.edges.length);
            console.log('Nodes:', snap.deps.nodes.length);
            if (snap.deps.edges.length === 0) process.exit(1);
          "
